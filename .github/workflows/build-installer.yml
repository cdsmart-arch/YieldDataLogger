name: Build Windows Installer

# Builds a self-contained Setup.exe using Inno Setup.
# Triggers whenever code that affects the installer changes, or manually.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'installer/**'
      - '.github/workflows/build-installer.yml'
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # -----------------------------------------------------------------------
      - name: Publish Agent (self-contained win-x64)
        run: |
          dotnet publish src/YieldDataLogger.Agent `
            -c Release -r win-x64 --self-contained `
            -o dist/Agent

      # -----------------------------------------------------------------------
      - name: Publish Manager (self-contained win-x64)
        run: |
          dotnet publish src/YieldDataLogger.Manager `
            -c Release -r win-x64 --self-contained `
            -o dist/Manager

      # -----------------------------------------------------------------------
      # Inno Setup is pre-installed on GitHub windows-latest runners.
      # iscc.exe is the command-line compiler.
      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer\YieldDataLogger.iss
        shell: pwsh

      # -----------------------------------------------------------------------
      # Code signing – eliminates the Windows Defender SmartScreen warning.
      # Code signing – skipped gracefully when secrets are not configured.
      # To enable: add CODE_SIGNING_PFX (base64 .pfx) + CODE_SIGNING_PASSWORD
      # under GitHub → Settings → Secrets → Actions.
      # Encode your cert: [Convert]::ToBase64String([IO.File]::ReadAllBytes("cert.pfx")) | clip
      # Certificates: Sectigo/DigiCert OV (~$100/yr) or DigiCert EV (~$300/yr)
      - name: Sign installer (optional)
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.CODE_SIGNING_PFX }}
          PFX_PASS:   ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_BASE64)) {
            Write-Host "CODE_SIGNING_PFX secret not configured – skipping code signing."
            Write-Host "Users will see a SmartScreen warning; click 'More info' then 'Run anyway'."
            exit 0
          }

          $pfxPath = "$env:TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_BASE64))

          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
                         -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                       Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool.exe not found in Windows Kits" }

          $installer = (Get-Item "dist\installer\YieldDataLogger-Setup-*.exe").FullName
          & $signtool sign /f $pfxPath /p $env:PFX_PASS `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 $installer

          Remove-Item $pfxPath -Force
          Write-Host "Installer signed: $installer"

      # -----------------------------------------------------------------------
      # Upload the installer exe so it can be downloaded from the Actions tab.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: YieldDataLogger-Setup
          path: dist/installer/YieldDataLogger-Setup-*.exe
          retention-days: 30

      # -----------------------------------------------------------------------
      # If this is a tagged release (v1.0, v1.1, …) attach the installer to
      # the GitHub Release automatically.
      - name: Attach to GitHub Release (tagged pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/YieldDataLogger-Setup-*.exe
