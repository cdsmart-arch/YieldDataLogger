name: Build and deploy API to Azure Container Apps

# Trigger on push to main, or manually via the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - 'src/YieldDataLogger.Api/**'
      - 'src/YieldDataLogger.Core/**'
      - 'src/YieldDataLogger.Collector/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:   # allows "Run workflow" button in GitHub UI

# All secrets live in GitHub → Settings → Secrets and variables → Actions.
# See infra/azure-bootstrap.ps1 for the commands that create the resources and
# print the values you need to paste in.
#
# Required secrets:
#   AZURE_CREDENTIALS              - output of: az ad sp create-for-rbac --sdk-auth
#   ACR_LOGIN_SERVER               - e.g. yielddatalogger.azurecr.io
#   ACR_USERNAME                   - Registry admin username (or service principal)
#   ACR_PASSWORD                   - Registry admin password
#   AZURE_RESOURCE_GROUP           - e.g. rg-yielddatalogger
#   CONTAINERAPPS_APP_NAME         - e.g. yielddatalogger-api
#   CONTAINERAPPS_ENVIRONMENT_NAME - e.g. cae-yielddatalogger
#   STORAGE_CONNECTION_STRING      - Azure Table Storage connection string (secret, never logged)

env:
  IMAGE_NAME: yielddatalogger-api
  IMAGE_TAG:  ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # -------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # -------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------------------
      # Build the image and push two tags: git SHA (immutable) and "latest".
      # The Container App revision always tracks the SHA tag so we can roll back.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      # -------------------------------------------------------------------
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # -------------------------------------------------------------------
      # Deploy a new revision. Container Apps keeps old revisions for rollback.
      # Environment variables that aren't secrets are set here directly.
      # The storage connection string is passed via --secret so it never appears
      # in the activity log.
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: ${{ secrets.ACR_LOGIN_SERVER }}
          acrUsername: ${{ secrets.ACR_USERNAME }}
          acrPassword: ${{ secrets.ACR_PASSWORD }}
          containerAppName: ${{ secrets.CONTAINERAPPS_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Production
            Storage__Backend=table
            Storage__Tables__ConnectionString=secretref:storage-connection-string
            Storage__Tables__Enabled=true
            Storage__Sql__Enabled=false

      # -------------------------------------------------------------------
      - name: Verify deployment
        run: |
          echo "Deployed image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "Check health: https://<your-app-fqdn>/healthz"
